name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Restore dependencies
        run: dotnet restore armaoffline/armaoffline.csproj -p:TargetFrameworks=net10.0-android

      - name: Build & publish APK
        run: dotnet publish armaoffline/armaoffline.csproj -f net10.0-android -c Release -p:TargetFrameworks=net10.0-android

      - name: Upload APK as artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: armaoffline-debug
          path: '**/bin/Release/net10.0-android/publish/*.apk'

      - name: Upload APK to GitHub Release (tag runs)
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: '**/bin/Release/net10.0-android/publish/*.apk'
